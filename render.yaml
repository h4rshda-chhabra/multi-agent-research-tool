databases:
  - name: research-db
    databaseName: research
    user: research
    plan: free

services:
  - type: web
    name: research-agent-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: research-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: TAVILY_API_KEY_2
        sync: false
      - key: FRONTEND_URL
        sync: false
